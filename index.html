<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Optimization Simulator</title>

<style>
:root{
  --bg:#f4f4f4;
  --paper:#ffffff;
  --ink:#111;
  --ui:#e2e2e2;
  --good:#c8f7c5;
  --bad:#ffd6d6;
  --accent:#1d3461;
  --muted:#666;
}

body{
  margin:0;
  background:var(--bg);
  font-family: Georgia, "Times New Roman", serif;
  color:var(--ink);
}

.wrapper{ display:flex; height:100vh; }

.sidebar{
  width:320px;
  background:#fff;
  border-right:1px solid var(--ui);
  padding:18px;
  overflow:auto;
  box-sizing:border-box;
}

.resume{
  flex:1;
  overflow:auto;
  padding:34px 28px;
}

.paper{
  max-width:980px;
  margin:auto;
  background:var(--paper);
  padding:40px;
  box-shadow:0 0 14px rgba(0,0,0,.07);
  border-radius:10px;
}

h1{ margin:0 0 6px 0; }
h2{ margin:18px 0 8px 0; border-bottom:1px solid var(--ui); padding-bottom:6px; }

.token{
  cursor:pointer;
  padding:2px 4px;
  border-radius:4px;
}

.token.good.selected{ background:var(--good); }
.token.bad.flash{ background:var(--bad); }

button{
  padding:10px 12px;
  border:1px solid var(--ui);
  background:#fff;
  border-radius:10px;
  cursor:pointer;
  margin-top:8px;
}

button.primary{
  background:var(--accent);
  color:#fff;
  border:none;
}

.hud{
  margin-top:12px;
  padding:12px;
  border:1px solid var(--ui);
  border-radius:10px;
  background:#fafafa;
  font-size:14px;
}

.hud .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.panel{
  margin-top:12px;
  padding:12px;
  border:1px solid var(--ui);
  border-radius:10px;
  background:#fafafa;
  font-size:14px;
}
</style>
</head>

<body>
<div class="wrapper">

<aside class="sidebar">
  <h2>ATS Optimization Simulator</h2>

  <div class="hud">
    <div class="row"><span>Level</span><span id="hudLevel">—</span></div>
    <div class="row"><span>Time</span><span id="hudTime">—</span></div>
    <div class="row"><span>Score</span><span id="hudScore">0</span></div>
    <div class="row"><span>Correct</span><span id="hudCorrect">0</span></div>
    <div class="row"><span>Incorrect</span><span id="hudIncorrect">0</span></div>
  </div>

  <button class="primary" id="btnStart">Start</button>
  <button id="btnFinish" disabled>Finish</button>
  <button id="btnNext" disabled>Next Level</button>
  <button id="btnRestart">Restart</button>

  <div class="panel" id="results" style="display:none;"></div>
</aside>

<main class="resume">
  <div class="paper" id="paper">
    <h1>ATS Optimization Simulator</h1>
    <p>Click Start to begin.</p>
  </div>
</main>

</div>

<script>

/* =======================
   BUZZ SOUND (consistent)
======================= */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function buzz(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.setValueAtTime(180, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.18);
}

/* =======================
   DATA (Increased Density + Campus)
======================= */

const COURSE = [
{
  level:1,
  timeSeconds:75,
  resume:`
<h1>Jordan Martinez</h1>

<h2>Summary</h2>
<p>
<span class="token good">Digital Marketing Specialist</span>;
<span class="token good">SEO strategy</span>;
<span class="token good">A/B testing</span>;
<span class="token good">GA4 implementation</span>;
<span class="token bad">creative visionary</span>;
<span class="token bad">team player</span>;
<span class="token good">conversion rate optimization</span>;
<span class="token good">data-driven reporting</span>;
<span class="token bad">fast learner</span>.
</p>

<h2>Experience</h2>
<p>
Improved <span class="token good">conversion rate by 22%</span>;
Built <span class="token good">KPI dashboards</span>;
Conducted <span class="token good">keyword research</span>;
Optimized <span class="token good">landing pages</span>;
Delivered <span class="token bad">impactful storytelling</span>;
Led <span class="token bad">high-energy campaigns</span>.
</p>

<h2>Campus Leadership</h2>
<p>
<span class="token good">Treasurer, Student Senate</span>;
Managed <span class="token good">$45,000 annual budget</span>;
Organized <span class="token good">cross-department coordination</span>;
<span class="token bad">campus changemaker</span>;
<span class="token bad">motivational presence</span>.
</p>

<h2>Athletics</h2>
<p>
<span class="token good">Varsity Soccer Team Captain</span>;
Tracked <span class="token good">performance metrics</span>;
Coordinated <span class="token good">training schedules</span>;
<span class="token bad">natural leader</span>;
<span class="token bad">locker-room inspiration</span>.
</p>
`
}
];

/* =======================
   GAME STATE
======================= */

let score=0, correct=0, incorrect=0, timeLeft=0, timer=null;

const paper=document.getElementById("paper");
const results=document.getElementById("results");

document.getElementById("btnStart").onclick=start;
document.getElementById("btnFinish").onclick=finish;
document.getElementById("btnRestart").onclick=restart;

function start(){
  const level=COURSE[0];
  paper.innerHTML=level.resume;
  score=0; correct=0; incorrect=0;
  results.style.display="none";

  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>handleClick(t);
  });

  timeLeft=level.timeSeconds;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("hudTime").textContent=timeLeft+"s";
    if(timeLeft<=0){ clearInterval(timer); finish(); }
  },1000);

  document.getElementById("hudLevel").textContent="1";
}

function handleClick(t){
  if(t.classList.contains("selected")) return;
  if(t.classList.contains("good")){
    score+=5; correct++;
    t.classList.add("selected");
  } else {
    score-=3; incorrect++;
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("hudScore").textContent=score;
  document.getElementById("hudCorrect").textContent=correct;
  document.getElementById("hudIncorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);
  results.style.display="block";
  results.innerHTML=`
  <strong>Final Score:</strong> ${score}<br/>
  Correct: ${correct}<br/>
  Incorrect: ${incorrect}<br/>
  Remember: measurable outcomes and structured responsibilities matter more than personality claims.
  `;
}

function restart(){
  location.reload();
}

</script>
</body>
</html>
