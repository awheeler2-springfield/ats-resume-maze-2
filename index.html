<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Scan Simulation</title>

<style>
:root{
  --nav:#1D3461;
  --bg:#f3f3f3;
  --paper:#fff;
  --green:#1A6B45;
  --red:#c0392b;
}

body{margin:0;font-family:Arial;background:var(--bg);}
.rail{
  position:fixed;left:0;top:0;
  width:320px;height:100vh;
  background:var(--nav);color:#fff;
  padding:20px;box-sizing:border-box;
}
.main{margin-left:320px;padding:40px;}
.resume{
  max-width:900px;margin:auto;
  background:#fff;padding:40px;
  border-radius:10px;
  box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.section-title{font-weight:bold;margin-top:20px;border-bottom:1px solid #000;}

.phrase{
  cursor:pointer;
  padding:2px 4px;
}

.correct{background:var(--green);color:#fff;}
.wrong{background:var(--red);color:#fff;}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  margin:6px 0;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="rail">
  <h2>ATS Scan Simulation</h2>
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="timer">60</span></div>
  <div>Mode: <span id="modeLabel">Highlight Strengths</span></div>
  <div>Domain:
    <select id="domainSelect">
      <option value="data">Data</option>
      <option value="marketing">Marketing</option>
      <option value="operations">Operations</option>
    </select>
  </div>
  <div>Difficulty:
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>
  <button onclick="toggleMode()">Toggle Mode</button>
  <button onclick="startGame()">Start</button>
  <div id="results"></div>
</div>

<div class="main">
<div class="resume" id="resume"></div>
</div>

<script>

let score=0;
let timer=60;
let interval;
let mode="strength"; // or "risk"
let active=false;
let stats={correct:0,wrong:0,missed:0};

const phraseBank={
data:{
strength:[
"Improved ROI by 18%",
"Analyzed cross-channel performance data",
"Built predictive models",
"Increased engagement 35%",
"Automated reporting workflow"
],
risk:[
"Hard-working team player",
"Worked on various reports",
"SEO GA4 AI KPI scrum agile",
"Responsible for helping",
"Two-column layout with icons"
]
},
marketing:{
strength:[
"Increased conversion rate 22%",
"Optimized email segmentation",
"Led A/B testing initiative",
"Reduced CPA by 14%",
"Improved CTR 30%"
],
risk:[
"Passionate about branding",
"Grew awareness significantly",
"Synergy-driven strategy",
"Multi-tasked efficiently",
"Designer resume template"
]
},
operations:{
strength:[
"Reduced fulfillment time 20%",
"Streamlined workflow processes",
"Implemented KPI tracking",
"Cut costs by 12%",
"Improved supply chain efficiency"
],
risk:[
"Helped where needed",
"Managed everything company-wide",
"Team-oriented mindset",
"Visually enhanced resume layout",
"General operational support"
]
}
};

function startGame(){
score=0;
stats={correct:0,wrong:0,missed:0};
timer=60;
active=true;
document.getElementById("score").textContent=score;
document.getElementById("timer").textContent=timer;
buildResume();
interval=setInterval(tick,1000);
}

function tick(){
timer--;
document.getElementById("timer").textContent=timer;
if(timer<=0){
clearInterval(interval);
active=false;
calculateMissed();
showResults();
}
}

function toggleMode(){
mode = (mode==="strength")?"risk":"strength";
document.getElementById("modeLabel").textContent =
mode==="strength"?"Highlight Strengths":"Highlight Risks";
}

function buildResume(){
const domain=document.getElementById("domainSelect").value;
const difficulty=document.getElementById("difficulty").value;
let strengths=[...phraseBank[domain].strength];
let risks=[...phraseBank[domain].risk];

if(difficulty==="hard"){
strengths.push("Demonstrated impact across verticals");
risks.push("Results-driven professional");
}

let combined=[...strengths,...risks];
shuffle(combined);

let html="<div class='section-title'>PROFESSIONAL EXPERIENCE</div><ul>";
combined.forEach(p=>{
html+=`<li><span class="phrase" data-type="${
strengths.includes(p)?"strength":"risk"
}">${p}</span></li>`;
});
html+="</ul>";

document.getElementById("resume").innerHTML=html;

document.querySelectorAll(".phrase").forEach(el=>{
el.onclick=function(){
if(!active)return;
let type=el.getAttribute("data-type");
if(type===mode){
score+=3;
stats.correct++;
el.classList.add("correct");
}else{
score-=2;
stats.wrong++;
el.classList.add("wrong");
}
document.getElementById("score").textContent=score;
};
});
}

function calculateMissed(){
document.querySelectorAll(".phrase").forEach(el=>{
let type=el.getAttribute("data-type");
if(type==="strength" && mode==="strength" && !el.classList.contains("correct")){
stats.missed++;
}
});
}

function showResults(){
let reflection="";
if(score>30){
reflection="Strong ATS signal recognition with good risk discrimination.";
}else if(score>10){
reflection="Moderate recognition; consider precision in identifying measurable impact.";
}else{
reflection="You may be prioritizing buzzwords over measurable and ATS-safe phrasing.";
}
document.getElementById("results").innerHTML=
"<br><strong>Final Score:</strong> "+score+
"<br>Correct: "+stats.correct+
"<br>Wrong: "+stats.wrong+
"<br>Missed Strengths: "+stats.missed+
"<br><br>"+reflection;
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

</script>
</body>
</html>
