<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>ATS Optimization Simulator</title>

<style>
:root{
  --bg:#e9e9e9;
  --paper:#fff;
  --good:#c8f7c5;
  --missed:#b5e3ff;
  --bad:#ffd6d6;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial, Helvetica, sans-serif;
}

.wrapper{display:flex;height:100vh;}
.sidebar{
  width:340px;
  background:#fff;
  padding:20px;
  border-right:1px solid #ddd;
  overflow:auto;
}
.resume{flex:1;padding:40px;overflow:auto;}
.paper{
  width:850px;
  margin:auto;
  background:var(--paper);
  padding:60px;
  box-shadow:0 0 25px rgba(0,0,0,.08);
}

h1{text-align:center;margin-bottom:5px;}
.sub{text-align:center;font-size:14px;margin-bottom:20px;}
.section{margin-top:25px;}
.section h2{
  font-size:16px;
  border-bottom:2px solid #000;
  padding-bottom:4px;
}
.role-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

ul{margin-top:6px;}

.token{
  cursor:pointer;
  padding:2px 3px;
  border-radius:4px;
}

.token.selected{background:var(--good);}
.token.flash{background:var(--bad);}
.token.correct-all{background:var(--good);}
.token.missed{background:var(--missed);}

button{
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}
.hud div{margin-bottom:6px;}
.small{font-size:12px;color:#444;margin-top:10px;}
</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">
<h2>ATS Scan</h2>

<div class="hud">
<div>Level: <span id="level">1</span></div>
<div>Time: <span id="time">45s</span></div>
<div>Score: <span id="score">0</span></div>
<div>Correct: <span id="correct">0</span></div>
<div>Incorrect: <span id="incorrect">0</span></div>
</div>

<button onclick="start()">Start</button>
<button onclick="finish()">Finish</button>
<button onclick="nextLevel()">Next Level</button>
<button onclick="location.reload()">Restart</button>

<div id="results" class="small"></div>
</div>

<div class="resume">
<div class="paper" id="paper">
<h1>ATS Optimization Simulator</h1>
<p class="sub">45 seconds. Click only structured, measurable, role-relevant language.</p>
</div>
</div>

</div>

<script>

/* ---------- Audio ---------- */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function buzz(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="square";o.frequency.value=170;g.gain.value=.12;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.2);
}

/* ---------- Resume Levels ---------- */

const LEVELS=[

/* LEVEL 1 — obvious decoys */

{
html:`
<h1>MICHAEL HARRIS</h1>
<div class="sub">Digital Marketing | SEO | SEM</div>

<div class="section">
<h2>WORK EXPERIENCE</h2>

<div class="role-header">
<span>Marketing Manager — XYZ Corp</span>
<span>2022–Present</span>
</div>
<ul>
<li><span class="token good" data-explain="Specific measurable leadership responsibility.">Led cross-functional team of 6</span></li>
<li><span class="token good" data-explain="Quantified performance outcome.">Increased traffic by 35%</span></li>
<li><span class="token bad" data-explain="Vague prestige phrase; no measurable system or skill.">Elevated brand presence</span></li>
<li><span class="token good" data-explain="Budget ownership is ATS-relevant.">Managed $200,000 annual budget</span></li>
<li><span class="token bad" data-explain="Generic adjective; ATS cannot score personality.">Results-driven leader</span></li>
</ul>
</div>
`
},

/* LEVEL 2 — prestige inflation */

{
html:`
<h1>EMMA LI</h1>
<div class="sub">Operations | Process Optimization</div>

<div class="section">
<h2>WORK EXPERIENCE</h2>

<div class="role-header">
<span>Operations Coordinator — Eastline</span>
<span>2021–Present</span>
</div>
<ul>
<li><span class="token good" data-explain="Process documentation is structured deliverable.">Standardized SOP documentation</span></li>
<li><span class="token good" data-explain="Quantified efficiency improvement.">Reduced processing time by 28%</span></li>
<li><span class="token bad" data-explain="Sounds strategic but lacks defined output.">Operational excellence architect</span></li>
<li><span class="token bad" data-explain="Leadership without measurable scope.">Empowered high-performance culture</span></li>
<li><span class="token good" data-explain="Workflow automation is system-based language.">Implemented intake workflow automation</span></li>
</ul>
</div>
`
},

/* LEVEL 3 — subtle decoys */

{
html:`
<h1>JORDAN RIVERA</h1>
<div class="sub">HR | Talent Operations</div>

<div class="section">
<h2>WORK EXPERIENCE</h2>

<div class="role-header">
<span>HR Generalist — Northbay Labs</span>
<span>2020–Present</span>
</div>
<ul>
<li><span class="token good" data-explain="Specific system ownership.">Maintained HRIS data integrity</span></li>
<li><span class="token good" data-explain="Quantified metric; ATS-relevant.">Reduced time-to-hire by 21%</span></li>
<li><span class="token bad" data-explain="Subtle: sounds professional but lacks defined deliverable.">Optimized people-first engagement strategies</span></li>
<li><span class="token bad" data-explain="Abstract leadership phrasing without scope.">Championed workplace harmony initiatives</span></li>
<li><span class="token good" data-explain="Compliance reporting is structured responsibility.">Produced weekly compliance metrics reports</span></li>
</ul>
</div>
`
}

];

let level=0;
let score=0,correct=0,incorrect=0;
let time=45,timer;

/* ---------- Game ---------- */

function start(){
  score=0;correct=0;incorrect=0;
  document.getElementById("results").innerHTML="";
  document.getElementById("paper").innerHTML=LEVELS[level].html;
  document.getElementById("level").textContent=level+1;

  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>clickToken(t);
  });

  time=45;
  document.getElementById("time").textContent=time+"s";
  timer=setInterval(()=>{
    time--;
    document.getElementById("time").textContent=time+"s";
    if(time<=0){clearInterval(timer);finish();}
  },1000);
}

function clickToken(t){
  if(t.classList.contains("selected"))return;
  if(t.classList.contains("good")){
    score+=5;correct++;
    t.classList.add("selected");
  }else{
    score-=3;incorrect++;
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("score").textContent=score;
  document.getElementById("correct").textContent=correct;
  document.getElementById("incorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);

  let explanation="";
  document.querySelectorAll(".token").forEach(t=>{
    if(t.classList.contains("good")){
      if(!t.classList.contains("selected")){
        t.classList.add("missed");
      }
      t.classList.add("correct-all");
    }else{
      if(t.classList.contains("flash")){
        explanation+="<div>❌ "+t.innerText+" — "+t.dataset.explain+"</div>";
      }
    }
  });

  document.getElementById("results").innerHTML=
  "<strong>Time's up!</strong><br>"+
  "Score: "+score+"<br>"+
  "Correct: "+correct+"<br>"+
  "Incorrect: "+incorrect+
  "<br><br><strong>Incorrect Click Explanations:</strong><br>"+explanation+
  "<br><br><em>Green = ATS-relevant. Blue = missed but important.</em>";
}

function nextLevel(){
  if(level<LEVELS.length-1){
    level++;
    start();
  }
}

</script>

</body>
</html>
