<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>ATS Optimization Simulator</title>

<style>
:root{
  --bg:#e6e6e6;
  --paper:#ffffff;
  --good:#c8f7c5;
  --bad:#ffd6d6;
  --missed:#cde9ff;
}

body{margin:0;background:var(--bg);font-family:Arial, Helvetica, sans-serif;}
.wrapper{display:flex;height:100vh;}
.sidebar{width:390px;background:#fff;padding:20px;border-right:1px solid #ccc;overflow:auto;}
.resume{flex:1;padding:50px;overflow:auto;}
.paper{width:900px;margin:auto;background:#fff;padding:70px 80px;box-shadow:0 0 35px rgba(0,0,0,.12);}
h1{text-align:center;margin:0 0 6px 0;}
.sub{text-align:center;font-size:14px;margin:0 0 25px 0;line-height:1.35;}
.section{margin-top:32px;}
.section h2{font-size:16px;border-bottom:2px solid #000;padding-bottom:4px;margin:0 0 12px 0;}
.role-header{display:flex;justify-content:space-between;font-weight:bold;margin-top:14px;}
ul{margin:6px 0 10px 18px;padding:0;}
li{margin-bottom:6px;line-height:1.35;}
.token{cursor:pointer;padding:2px 3px;border-radius:4px;}
.token.selected{background:var(--good);}
.token.flash{background:var(--bad);}
.token.correct-all{background:var(--good);}
.token.missed{background:var(--missed);}
button{padding:10px;margin-top:10px;border-radius:6px;border:1px solid #aaa;cursor:pointer;width:100%;}
.small{font-size:12.5px;line-height:1.45;margin-top:12px;}
.hr{height:1px;background:#e5e5e5;margin:12px 0;}
.badge{display:inline-block;padding:2px 8px;border:1px solid #ddd;border-radius:999px;font-size:12px;margin-left:6px;}
.muted{color:#555;}
</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">
<h2>ATS Scan</h2>

<div class="small">
<b>Level:</b> <span id="level">1</span> <span class="badge" id="bandLevel">—</span><br>
<b>Time:</b> <span id="time">55s</span>

<div class="hr"></div>

<b>Level Score:</b> <span id="score">0</span><br>
<b>Level Correct:</b> <span id="correct">0</span><br>
<b>Level Incorrect:</b> <span id="incorrect">0</span><br>
<b>Coverage:</b> <span id="coverage">—</span><br>
<b>Accuracy:</b> <span id="accuracy">—</span>

<div class="hr"></div>

<b>Cumulative Score:</b> <span id="cumScore">0</span> <span class="badge" id="bandCourse">—</span><br>
<b>Cumulative Correct:</b> <span id="cumCorrect">0</span><br>
<b>Cumulative Incorrect:</b> <span id="cumIncorrect">0</span>
</div>

<button onclick="start()">Start</button>
<button onclick="finish()">Finish</button>
<button onclick="nextLevel()">Next Level</button>
<button onclick="location.reload()">Restart</button>

<div id="results" class="small"></div>
</div>

<div class="resume">
<div class="paper" id="paper">
<h1>ATS Optimization Simulator</h1>
<p class="sub">55 seconds. Click measurable, structured, role-relevant language only.</p>
</div>
</div>

</div>

<script>

/* TIMER = 55 SECONDS */
let timeLeft = 55;
let timer;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function buzz(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="square";o.frequency.value=170;g.gain.value=.12;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.2);
}

/* CUMULATIVE STATE */
let levelIndex=0;
let score=0,correct=0,incorrect=0;
let cumScore=0,cumCorrect=0,cumIncorrect=0;
let wrongClicks=[],missed=[],totalGood=0,clickedGood=0;
let levelFinalized=false;

/* IMPORTANT CHANGE:
   MAJOR IS NOT CLICKABLE.
   It is plain text, not wrapped in token.
*/

const LEVELS=[{
html:`
<h1>SOPHIA MARTINEZ</h1>
<div class="sub">
Multimedia Journalism | Video Production<br>
Boston, MA
</div>

<div class="section">
<h2>EDUCATION</h2>
Northeastern University — B.A. Journalism (Major)<br>
GPA: <span class="token good">3.8/4.0</span>
</div>

<div class="section">
<h2>INTERNSHIP EXPERIENCE</h2>

<div class="role-header">
<span>Multimedia Intern — Boston Globe</span>
<span>Summer 2024</span>
</div>
<ul>
<li>Produced <span class="token good">12 multimedia news packages</span>.</li>
<li>Improved <span class="token good">audience engagement by 18%</span>.</li>
<li><span class="token bad">Crafted compelling narratives</span>.</li>
<li>Edited in <span class="token good">Adobe Premiere Pro</span>.</li>
</ul>
</div>
`
},
{
html:`
<h1>ETHAN KIM</h1>
<div class="sub">
Computer Science | Backend Development
</div>

<div class="section">
<h2>EDUCATION</h2>
University of Washington — B.S. Computer Science (Major)<br>
GPA: <span class="token good">3.6/4.0</span>
</div>

<div class="section">
<h2>INTERNSHIP EXPERIENCE</h2>

<div class="role-header">
<span>Software Engineering Intern — Microsoft</span>
<span>2024</span>
</div>
<ul>
<li>Built <span class="token good">RESTful APIs in Python</span>.</li>
<li>Reduced <span class="token good">query latency by 32%</span>.</li>
<li><span class="token bad">Innovative coding visionary</span>.</li>
<li>Implemented <span class="token good">unit testing in pytest</span>.</li>
</ul>
</div>
`
},
{
html:`
<h1>JORDAN WALKER</h1>
<div class="sub">
Sports Management | Event Operations
</div>

<div class="section">
<h2>EDUCATION</h2>
University of Illinois — B.S. Sports Management (Major)<br>
GPA: <span class="token good">3.5/4.0</span>
</div>

<div class="section">
<h2>PROFESSIONAL EXPERIENCE</h2>

<div class="role-header">
<span>Operations Intern — Major League Organization</span>
<span>2024</span>
</div>
<ul>
<li>Coordinated logistics for <span class="token good">20,000+ attendees</span>.</li>
<li>Reduced <span class="token good">event setup time by 15%</span>.</li>
<li><span class="token bad">Enhanced stakeholder synergy</span>.</li>
<li>Tracked <span class="token good">sponsorship ROI metrics</span>.</li>
</ul>
</div>
`
}];

/* START */
function start(){
score=0;correct=0;incorrect=0;
wrongClicks=[];missed=[];clickedGood=0;
levelFinalized=false;

document.getElementById("paper").innerHTML=LEVELS[levelIndex].html;
document.getElementById("level").textContent=levelIndex+1;
document.getElementById("results").innerHTML="";

const tokens=document.querySelectorAll(".token");
tokens.forEach(t=>t.onclick=()=>clickToken(t));
totalGood=[...tokens].filter(t=>t.classList.contains("good")).length;

timeLeft=55;
document.getElementById("time").textContent=timeLeft+"s";
clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
document.getElementById("time").textContent=timeLeft+"s";
if(timeLeft<=0){clearInterval(timer);finish();}
},1000);

updateHUD();
}

function clickToken(t){
if(levelFinalized)return;
if(t.classList.contains("selected"))return;

if(t.classList.contains("good")){
score+=5;correct++;clickedGood++;
t.classList.add("selected");
}else{
score-=3;incorrect++;
wrongClicks.push(t.innerText);
t.classList.add("flash");
buzz();
setTimeout(()=>t.classList.remove("flash"),250);
}
updateHUD();
}

function finish(){
if(levelFinalized)return;
levelFinalized=true;
clearInterval(timer);

document.querySelectorAll(".token").forEach(t=>{
if(t.classList.contains("good")){
if(!t.classList.contains("selected")){
missed.push(t.innerText);
t.classList.add("missed");
}
t.classList.add("correct-all");
}
});

cumScore+=score;
cumCorrect+=correct;
cumIncorrect+=incorrect;

updateHUD();

document.getElementById("results").innerHTML=`
<b>Time's up!</b><br>
<b>Why Major Was Not Clickable:</b><br>
ATS systems parse your major as structured education data.
However, major typically functions as a qualification filter,
not a ranking booster. This simulator focuses on performance
signals — metrics, tools, systems, and deliverables — which
drive ranking strength.<br><br>

<b>Missed Correct Signals:</b><br>
${missed.join("<br>")}<br><br>

<b>Incorrect Clicks:</b><br>
${wrongClicks.join("<br>")}
`;
}

function nextLevel(){
if(levelIndex<LEVELS.length-1){
levelIndex++;
start();
}
}

function updateHUD(){
document.getElementById("score").textContent=score;
document.getElementById("correct").textContent=correct;
document.getElementById("incorrect").textContent=incorrect;
document.getElementById("coverage").textContent=
totalGood?Math.round((clickedGood/totalGood)*100)+"%":"—";
document.getElementById("accuracy").textContent=
(correct+incorrect)?Math.round((correct/(correct+incorrect))*100)+"%":"—";

document.getElementById("cumScore").textContent=cumScore;
document.getElementById("cumCorrect").textContent=cumCorrect;
document.getElementById("cumIncorrect").textContent=cumIncorrect;

document.getElementById("bandLevel").textContent=
score>60?"ATS Analyst":score>30?"ATS Apprentice":"Needs Calibration";

document.getElementById("bandCourse").textContent=
cumScore>150?"ATS Director":cumScore>80?"ATS Analyst":"ATS Apprentice";
}

</script>

</body>
</html>
