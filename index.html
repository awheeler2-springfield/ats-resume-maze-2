<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>ATS Optimization Simulator</title>

<style>
:root{
  --bg:#e9e9e9;
  --paper:#fff;
  --good:#c8f7c5;
  --missed:#cde9ff;
  --bad:#ffd6d6;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial, Helvetica, sans-serif;
}

.wrapper{display:flex;height:100vh;}

.sidebar{
  width:360px;
  background:#fff;
  padding:20px;
  border-right:1px solid #ddd;
  overflow:auto;
}

.resume{flex:1;padding:40px;overflow:auto;}

.paper{
  width:850px;
  margin:auto;
  background:var(--paper);
  padding:60px 70px;
  box-shadow:0 0 30px rgba(0,0,0,.08);
}

h1{text-align:center;margin-bottom:6px;letter-spacing:1px;}
.sub{text-align:center;font-size:14px;margin-bottom:20px;}

.section{margin-top:28px;}
.section h2{
  font-size:16px;
  border-bottom:2px solid #000;
  padding-bottom:4px;
}

.role-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

ul{margin-top:6px;}

.token{
  cursor:pointer;
  padding:2px 3px;
  border-radius:4px;
}

.token.selected{background:var(--good);}
.token.flash{background:var(--bad);}
.token.correct-all{background:var(--good);}
.token.missed{background:var(--missed);}

button{
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}

.small{font-size:12px;margin-top:10px;line-height:1.4;}
</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">
<h2>ATS Scan</h2>

<div>
Level: <span id="level">1</span><br>
Time: <span id="time">45s</span><br>
Score: <span id="score">0</span><br>
Correct: <span id="correct">0</span><br>
Incorrect: <span id="incorrect">0</span>
</div>

<button onclick="start()">Start</button>
<button onclick="finish()">Finish</button>
<button onclick="nextLevel()">Next Level</button>
<button onclick="location.reload()">Restart</button>

<div id="results" class="small"></div>
</div>

<div class="resume">
<div class="paper" id="paper">
<h1>ATS Optimization Simulator</h1>
<p class="sub">45 seconds. Click measurable, structured, role-relevant language.</p>
</div>
</div>

</div>

<script>

/* ---------------- AUDIO ---------------- */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function buzz(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="square";o.frequency.value=170;g.gain.value=.12;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.2);
}

/* ---------------- LEVEL DATA ---------------- */

const LEVELS=[

{

</ul>
</div>

<div class="section">
<h2>EDUCATION</h2>
Bachelor of Marketing — University of Sydney<br>
GPA: <span class="token good" data-type="credential">3.7/4.0</span>

/* ---------- LEVEL 2: more subtle decoys ---------- */

html:`
<h1>EMMA LI</h1>

];

/* ---------------- GAME LOGIC ---------------- */

let level=0;
let score=0,correct=0,incorrect=0;
let timer,time=45;
let wrongClicks=[];

function start(){
  score=0;correct=0;incorrect=0;wrongClicks=[];
  document.getElementById("results").innerHTML="";
  document.getElementById("paper").innerHTML=LEVELS[level].html;
  document.getElementById("level").textContent=level+1;

  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>clickToken(t);
  });

  time=45;
  document.getElementById("time").textContent=time+"s";
  timer=setInterval(()=>{
    time--;
    document.getElementById("time").textContent=time+"s";
    if(time<=0){clearInterval(timer);finish();}
  },1000);
}

function clickToken(t){
  if(t.classList.contains("selected"))return;

  if(t.classList.contains("good")){
    score+=5;correct++;
    t.classList.add("selected");
  }else{
    score-=3;incorrect++;
    wrongClicks.push({text:t.innerText,type:t.dataset.type});
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("score").textContent=score;
  document.getElementById("correct").textContent=correct;
  document.getElementById("incorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);

  document.querySelectorAll(".token").forEach(t=>{
    if(t.classList.contains("good")){
      if(!t.classList.contains("selected")) t.classList.add("missed");
      t.classList.add("correct-all");
    }
  });

  let explanation="<strong>Detailed Error Analysis:</strong><br>";

  wrongClicks.forEach(w=>{
    explanation+="<div>❌ <b>"+w.text+"</b> — ";
    if(w.type==="soft") explanation+="Personality descriptor. ATS systems do not score traits.";
    else if(w.type==="prestige") explanation+="Prestige/inflated phrasing. No measurable system or outcome.";
    else if(w.type==="vague") explanation+="Vague task without defined output or metric.";
    else if(w.type==="subtle") explanation+="Professional-sounding but lacks deliverable, system, or measurable scope.";
    explanation+="</div>";
  });

  explanation+="<br><em>Green = ATS-relevant. Blue = missed high-value language.</em>";

  document.getElementById("results").innerHTML=
  "<strong>Time's up!</strong><br>"+
  "Score: "+score+
  "<br>Correct: "+correct+
  "<br>Incorrect: "+incorrect+
  "<br><br>"+explanation;
}

function nextLevel(){
  if(level<LEVELS.length-1){
    level++;
    start();
  }
}

</script>

</body>
</html>
