<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Word-Level Scan</title>

<style>
:root{
  --nav:#1D3461;
  --bg:#f3f3f3;
  --paper:#fff;
  --green:#1A6B45;
  --red:#c0392b;
}

body{margin:0;background:var(--bg);font-family:Georgia, serif;color:#111;}

.rail{
  position:fixed;left:0;top:0;
  width:340px;height:100vh;
  background:var(--nav);color:#fff;
  padding:20px;box-sizing:border-box;
  font-family:Arial;
}

.main{margin-left:340px;padding:40px;}

.resume{
  max-width:850px;margin:auto;
  background:var(--paper);
  padding:50px;
  box-shadow:0 2px 18px rgba(0,0,0,.08);
}

h1{margin:0;font-size:1.9rem;}
.header-line{margin-top:4px;color:#444;}

.section-title{
  margin-top:26px;
  font-weight:bold;
  border-bottom:1px solid #000;
  padding-bottom:4px;
}

.job-title{font-weight:bold;margin-top:16px;}
.company{color:#444;}

ul{margin:8px 0 0 18px;}

.word{
  cursor:pointer;
  padding:1px 2px;
}

.correct{background:var(--green);color:#fff;}
.wrong{background:var(--red);color:#fff;}

.small{font-size:.9rem;}
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="rail">
  <h2>ATS Word Scan</h2>
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="timer">75</span></div>
  <button onclick="start()">Start Scan</button>
  <div id="results" class="small"></div>
</div>

<div class="main">
<div class="resume" id="resume"></div>
</div>

<script>

let score=0;
let timer=75;
let interval;
let active=false;

let stats={
  strongFound:0,
  trapsClicked:0,
  missedStrong:0,
  totalStrong:0
};

const strongWords=[
"Improved","Reduced","Increased","Analyzed","Built",
"18%","35%","20%","$650,000","$40,000,000",
"Predictive","Optimized","Led","Executed","Securing"
];

const trapWords=[
"Passion","Hard-working","Responsible",
"Helped","Synergy","Various","Worked","Significantly"
];

function start(){
score=0;
timer=75;
stats={strongFound:0,trapsClicked:0,missedStrong:0,totalStrong:0};
active=true;
document.getElementById("score").textContent=score;
document.getElementById("timer").textContent=timer;
document.getElementById("results").innerHTML="";
buildResume();
interval=setInterval(tick,1000);
}

function tick(){
timer--;
document.getElementById("timer").textContent=timer;
if(timer<=0){
clearInterval(interval);
active=false;
calculateMissed();
showFeedback();
}
}

function buildResume(){

let resumeText = `
Charles Bloomberg
Seoul, South Korea • charlesbloomberg@gmail.com • (621) 799-5548

PROFESSIONAL SUMMARY
Passion for building inspiring companies through industry-leading tech, design, and execution.

PROFESSIONAL EXPERIENCE

CEO & Founder — Rezi
• Improved user growth by 18% securing over $650,000 in funding.
• Built scalable partnerships and Increased global expansion 35%.
• Responsible for helping marketing teams optimize outreach.

Web Developer — Kaplan
• Executed redesign and Optimized landing pages.
• Worked on various analytics reports and Helped improve performance.

Marketing Analyst — Kaplan
• Analyzed data and Reduced CPA by 20%.
• Significantly increased awareness through synergy initiatives.
`;

let words = resumeText.split(" ");

let html="";
words.forEach(word=>{
let clean=word.replace(/[^a-zA-Z0-9%$]/g,"");
let type="";
if(strongWords.includes(clean)){
type="strength";
stats.totalStrong++;
}
if(trapWords.includes(clean)){
type="risk";
}
if(type){
html+=`<span class="word" data-type="${type}">${word}</span> `;
}else{
html+=word+" ";
}
});

document.getElementById("resume").innerHTML=html;

document.querySelectorAll(".word").forEach(el=>{
el.onclick=function(){
if(!active)return;
let type=el.getAttribute("data-type");
if(type==="strength"){
score+=4;
stats.strongFound++;
el.classList.add("correct");
}
if(type==="risk"){
score-=3;
stats.trapsClicked++;
el.classList.add("wrong");
}
document.getElementById("score").textContent=score;
};
});
}

function calculateMissed(){
stats.missedStrong = stats.totalStrong - stats.strongFound;
}

function showFeedback(){

let diagnostic="";

if(stats.trapsClicked===0){
diagnostic+="You demonstrated disciplined lexical discrimination. ";
}else{
diagnostic+="You clicked language that signals low rhetorical density or inflated abstraction. ";
}

if(stats.missedStrong>2){
diagnostic+="You overlooked measurable impact markers; your scanning pattern may prioritize narrative over quantifiable proof. ";
}

if(score>25){
diagnostic+="Overall, your scan pattern suggests an ability to detect metrics, agency, and scalable outcomes under time pressure.";
}else{
diagnostic+="Your scan pattern suggests susceptibility to abstraction and weak-verb constructions.";
}

diagnostic+=`
<br><br><strong>Metrics:</strong>
<br>Strong words found: ${stats.strongFound}/${stats.totalStrong}
<br>Trap words clicked: ${stats.trapsClicked}
<br>Missed high-signal words: ${stats.missedStrong}
<br><br>
Reflect: Did you privilege verbs, numbers, or perceived leadership language? 
What would change if you were optimizing for ATS parsing rather than human narrative?
`;

document.getElementById("results").innerHTML=
"<br><strong>Final Score:</strong> "+score+
"<br><br>"+diagnostic;
}

</script>
</body>
</html>
