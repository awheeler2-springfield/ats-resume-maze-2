<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Hybrid Trainer</title>

<style>
:root{
  --nav:#1D3461;
  --bg:#f3f3f3;
  --paper:#fff;
  --ink:#111;
  --green:#1A6B45;
  --red:#c0392b;
  --yellow:#ffe86a;
}

body{margin:0;font-family:Arial;background:var(--bg);color:var(--ink);}
.rail{
  position:fixed;left:0;top:0;
  width:320px;height:100vh;
  background:var(--nav);color:#fff;
  padding:20px;box-sizing:border-box;
}
.rail h2{margin-top:0;}
.stat{margin:10px 0;}
button{
  padding:10px 14px;border:none;border-radius:6px;
  font-weight:bold;cursor:pointer;
}

.main{
  margin-left:320px;
  padding:40px;
}

.card{
  max-width:900px;
  margin:auto;
  background:var(--paper);
  padding:40px;
  border-radius:12px;
  box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.phrase{
  font-size:1.3rem;
  margin:20px 0;
}

.option{
  display:inline-block;
  padding:8px 14px;
  margin:6px;
  border-radius:999px;
  border:1px solid #ddd;
  cursor:pointer;
}

.option.correct{background:var(--green);color:#fff;}
.option.wrong{background:var(--red);color:#fff;}

.hidden{display:none;}
.bullet-block{margin:18px 0;font-size:1.1rem;}
.select{
  display:inline-block;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  border:1px solid #ddd;
  cursor:pointer;
}
.select.correct{background:var(--green);color:#fff;}
.select.wrong{background:var(--red);color:#fff;}
</style>
</head>
<body>

<div class="rail">
  <h2>ATS Hybrid Trainer</h2>
  <div class="stat">Score: <span id="score">0</span></div>
  <div class="stat">Time: <span id="timer">60</span></div>
  <div class="stat">Accuracy: <span id="accuracy">0%</span></div>
  <button onclick="startSprint()">Start Sprint</button>
</div>

<div class="main">
<div class="card">

<!-- Phase 1 -->
<div id="phase1">
  <h3>Phase 1: ATS Signal Sprint</h3>
  <div id="phrase" class="phrase"></div>
  <button onclick="clickSignal(true)">High-Signal</button>
  <button onclick="clickSignal(false)">Low-Signal</button>
</div>

<!-- Phase 2 -->
<div id="phase2" class="hidden">
  <h3>Phase 2: Rhetorical Assembly</h3>

  <div class="bullet-block">
    Analyzed
    <span id="b1a"></span>
    to identify
    <span id="b1b"></span>.
  </div>

  <div class="bullet-block">
    Improved campaign ROI
    <span id="b2a"></span>
    through
    <span id="b2b"></span>.
  </div>

  <div class="bullet-block">
    Kept formatting consistent using
    <span id="b3a"></span>.
  </div>

  <button onclick="finishAssembly()">Finish</button>
</div>

<!-- Debrief -->
<div id="debrief" class="hidden">
  <h3>Reflection</h3>
  <div id="analysis"></div>
</div>

</div>
</div>

<script>

/* =========================
   PHASE 1 — SIGNAL SPRINT
========================= */

let phrases = [
  {text:"Improved ROI by 18%", good:true},
  {text:"Hard-working team player", good:false},
  {text:"SEO GA4 AI KPI scrum agile", good:false},
  {text:"Analyzed cross-channel performance data", good:true},
  {text:"Two-column layout with icons", good:false},
  {text:"Increased engagement 35% in 6 months", good:true},
  {text:"Responsible for helping with reports", good:false}
];

let sprintActive = false;
let timer = 60;
let score = 0;
let correct = 0;
let total = 0;
let interval;
let current;

function startSprint(){
  score = 0;
  correct = 0;
  total = 0;
  timer = 60;
  sprintActive = true;
  document.getElementById("score").textContent = score;
  document.getElementById("timer").textContent = timer;
  document.getElementById("accuracy").textContent = "0%";
  document.getElementById("phase2").classList.add("hidden");
  document.getElementById("debrief").classList.add("hidden");
  nextPhrase();
  interval = setInterval(tick,1000);
}

function tick(){
  timer--;
  document.getElementById("timer").textContent = timer;
  if(timer<=0){
    clearInterval(interval);
    sprintActive = false;
    beginAssembly();
  }
}

function nextPhrase(){
  current = phrases[Math.floor(Math.random()*phrases.length)];
  document.getElementById("phrase").textContent = current.text;
}

function clickSignal(choice){
  if(!sprintActive) return;
  total++;
  if(choice===current.good){
    score+=2;
    correct++;
  }else{
    score-=3;
  }
  document.getElementById("score").textContent = score;
  document.getElementById("accuracy").textContent =
    Math.round((correct/total)*100)+"%";
  nextPhrase();
}

/* =========================
   PHASE 2 — ASSEMBLY
========================= */

function beginAssembly(){
  document.getElementById("phase1").classList.add("hidden");
  document.getElementById("phase2").classList.remove("hidden");

  buildSelect("b1a",[
    {t:"cross-channel performance data",good:true},
    {t:"various reports",good:false}
  ]);
  buildSelect("b1b",[
    {t:"growth opportunities",good:true},
    {t:"help where needed",good:false}
  ]);

  buildSelect("b2a",[
    {t:"by 18%",good:true},
    {t:"significantly",good:false}
  ]);
  buildSelect("b2b",[
    {t:"predictive modeling",good:true},
    {t:"different approaches",good:false}
  ]);

  buildSelect("b3a",[
    {t:"ATS-safe formatting",good:true},
    {t:"a designer template with icons",good:false}
  ]);
}

function buildSelect(id,options){
  let container = document.getElementById(id);
  container.innerHTML="";
  options.forEach(opt=>{
    let span=document.createElement("span");
    span.textContent=opt.t;
    span.className="select";
    span.onclick=function(){
      if(opt.good){
        span.classList.add("correct");
        score+=3;
      }else{
        span.classList.add("wrong");
        score-=2;
      }
      document.getElementById("score").textContent=score;
    };
    container.appendChild(span);
  });
}

function finishAssembly(){
  document.getElementById("phase2").classList.add("hidden");
  document.getElementById("debrief").classList.remove("hidden");

  let reflection="";
  if(score>80){
    reflection="You consistently identified high-signal language and constructed evidence-based bullets.";
  }else if(score>50){
    reflection="You recognize strong language but occasionally rely on vague or stylistic shortcuts.";
  }else{
    reflection="You may be prioritizing appearance or speed over measurable impact and ATS safety.";
  }

  document.getElementById("analysis").innerHTML =
    "<strong>Final Score:</strong> "+score+
    "<br><br>"+reflection;
}

</script>
</body>
</html>
