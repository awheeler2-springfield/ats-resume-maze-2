<script>

/* ---------- Buzz ---------- */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function buzz(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type="square";
  osc.frequency.value=170;
  gain.gain.value=.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+.2);
}

/* ---------- Level Data ---------- */

/* ---------- Game Logic ---------- */

let score=0, correct=0, incorrect=0;
let timer, timeLeft=45;

function start(){
  document.getElementById("paper").innerHTML=resumeHTML;
  document.getElementById("level").textContent="1";
  score=0; correct=0; incorrect=0;
  document.getElementById("results").innerHTML="";
  
  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>handleClick(t);
  });

  timeLeft=45;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("time").textContent=timeLeft+"s";
    if(timeLeft<=0){ clearInterval(timer); finish(); }
  },1000);
}

function handleClick(t){
  if(t.classList.contains("selected")) return;
  if(t.classList.contains("good")){
    score+=5; correct++;
    t.classList.add("selected");
  } else {
    score-=3; incorrect++;
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("score").textContent=score;
  document.getElementById("correct").textContent=correct;
  document.getElementById("incorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);
  document.getElementById("results").innerHTML=
  "<strong>Time's up!</strong><br>Score: "+score+
  "<br>Correct: "+correct+
  "<br>Incorrect: "+incorrect+
  "<br><br>⚡ Metrics > adjectives. Systems > vibes. Structure > hype.";
}

</script>
