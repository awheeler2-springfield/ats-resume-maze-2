<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Scan Immersion</title>

<style>
:root{
  --nav:#1D3461;
  --bg:#f3f3f3;
  --paper:#fff;
  --green:#1A6B45;
  --red:#c0392b;
}

body{margin:0;font-family:Georgia, serif;background:var(--bg);color:#111;}

.rail{
  position:fixed;left:0;top:0;
  width:340px;height:100vh;
  background:var(--nav);color:#fff;
  padding:20px;box-sizing:border-box;
  font-family:Arial;
}

.main{
  margin-left:340px;
  padding:40px;
}

.resume{
  max-width:850px;
  margin:auto;
  background:var(--paper);
  padding:50px;
  box-shadow:0 2px 18px rgba(0,0,0,.08);
}

h1{margin:0;font-size:1.8rem;}
.section-title{
  margin-top:24px;
  font-weight:bold;
  border-bottom:1px solid #000;
  padding-bottom:4px;
}

ul{margin:8px 0 0 18px;}

.clickable{
  cursor:pointer;
  padding:2px 4px;
}

.correct{background:var(--green);color:#fff;}
.wrong{background:var(--red);color:#fff;}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  margin:6px 0;
  cursor:pointer;
}

.small{font-size:.9rem;}
</style>
</head>
<body>

<div class="rail">
  <h2>ATS Immersion</h2>
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="timer">60</span></div>
  <div>Mode: <span id="modeLabel">Highlight Strengths</span></div>
  <div>Domain:
    <select id="domain">
      <option value="data">Data</option>
      <option value="marketing">Marketing</option>
      <option value="operations">Operations</option>
    </select>
  </div>
  <div>Difficulty:
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>
  <button onclick="toggleMode()">Toggle Mode</button>
  <button onclick="start()">Start</button>
  <div id="results" class="small"></div>
</div>

<div class="main">
<div class="resume" id="resume"></div>
</div>

<script>

let score=0;
let timer=60;
let active=false;
let interval;
let mode="strength";
let stats={correct:0,wrong:0,missed:0};

function toggleMode(){
mode = (mode==="strength")?"risk":"strength";
document.getElementById("modeLabel").textContent =
mode==="strength"?"Highlight Strengths":"Highlight Risks";
}

function start(){
score=0;
timer=60;
stats={correct:0,wrong:0,missed:0};
active=true;
document.getElementById("score").textContent=score;
document.getElementById("timer").textContent=timer;
document.getElementById("results").innerHTML="";
buildResume();
interval=setInterval(tick,1000);
}

function tick(){
timer--;
document.getElementById("timer").textContent=timer;
if(timer<=0){
clearInterval(interval);
active=false;
calculateMissed();
showResults();
}
}

function buildResume(){

const domain=document.getElementById("domain").value;
const difficulty=document.getElementById("difficulty").value;

let strengthPhrases=[
"Improved ROI by 18%",
"Increased engagement 35% in 6 months",
"Analyzed cross-channel performance data",
"Reduced fulfillment time 20%",
"Built predictive models"
];

let riskPhrases=[
"Hard-working team player",
"Responsible for helping",
"SEO GA4 AI KPI scrum agile",
"Grew awareness significantly",
"Two-column layout with icons"
];

if(difficulty==="hard"){
riskPhrases.push("Results-driven professional");
strengthPhrases.push("Reduced CPA by 14%");
}

function span(text,type){
return `<span class="clickable" data-type="${type}">${text}</span>`;
}

let resumeHTML=`
<h1>Jordan Avery</h1>
Springfield, MA • jordan@email.com • (555) 555-5555

<div class="section-title">SUMMARY</div>
<p>
${span(strengthPhrases[0],"strength")} with experience in analytics and reporting,
${span(riskPhrases[0],"risk")} passionate about innovation.
</p>

<div class="section-title">SKILLS</div>
<p>
SQL • Tableau • GA4 • Reporting •
${span(riskPhrases[2],"risk")}
</p>

<div class="section-title">PROFESSIONAL EXPERIENCE</div>

<strong>Senior Analyst — Meridian Insights</strong>
<ul>
<li>
${span(strengthPhrases[2],"strength")} to support executive decisions
and ${span(riskPhrases[1],"risk")} across departments.
</li>
<li>
${span(strengthPhrases[1],"strength")} while
${span(riskPhrases[3],"risk")}.
</li>
</ul>

<strong>Operations Intern — Northstar Logistics</strong>
<ul>
<li>
${span(strengthPhrases[3],"strength")} through KPI tracking,
avoiding ${span(riskPhrases[4],"risk")}.
</li>
</ul>

<div class="section-title">PROJECTS</div>
<p>
Developed interactive ATS Resume Maze; ${span(strengthPhrases[4],"strength")}
for hiring simulations.
</p>
`;

document.getElementById("resume").innerHTML=resumeHTML;

document.querySelectorAll(".clickable").forEach(el=>{
el.onclick=function(){
if(!active)return;
let type=el.getAttribute("data-type");
if(type===mode){
score+=3;
stats.correct++;
el.classList.add("correct");
}else{
score-=2;
stats.wrong++;
el.classList.add("wrong");
}
document.getElementById("score").textContent=score;
};
});
}

function calculateMissed(){
document.querySelectorAll(".clickable").forEach(el=>{
if(el.getAttribute("data-type")==="strength" &&
!el.classList.contains("correct")){
stats.missed++;
}
});
}

function showResults(){
let analysis="";
if(score>30){
analysis="You demonstrated strong ATS-level discrimination between signal and noise.";
}else if(score>10){
analysis="You recognize some high-signal language but may be overlooking measurable impact.";
}else{
analysis="You may be prioritizing buzzwords or aesthetics over quantifiable and ATS-safe phrasing.";
}

document.getElementById("results").innerHTML=
"<br><strong>Final Score:</strong> "+score+
"<br>Correct: "+stats.correct+
"<br>Wrong: "+stats.wrong+
"<br>Missed Strengths: "+stats.missed+
"<br><br>"+analysis;
}

</script>
</body>
</html>
