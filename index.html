<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Optimization Simulator</title>

<style>
:root{
  --bg:#f4f4f4;
  --paper:#ffffff;
  --ink:#111;
  --ui:#e2e2e2;
  --good:#c8f7c5;
  --bad:#ffd6d6;
  --accent:#1d3461;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Georgia, "Times New Roman", serif;
  color:var(--ink);
}

.wrapper{ display:flex; height:100vh; }

.sidebar{
  width:330px;
  background:#fff;
  border-right:1px solid var(--ui);
  padding:18px;
  overflow:auto;
  box-sizing:border-box;
}

.resume{
  flex:1;
  overflow:auto;
  padding:34px 28px;
}

.paper{
  max-width:980px;
  margin:auto;
  background:var(--paper);
  padding:40px;
  box-shadow:0 0 14px rgba(0,0,0,.07);
  border-radius:10px;
}

h1{ margin:0 0 6px 0; }
h2{ margin:18px 0 8px 0; border-bottom:1px solid var(--ui); padding-bottom:6px; }

.token{
  cursor:pointer;
  padding:2px 4px;
  border-radius:4px;
}

.token.good.selected{ background:var(--good); }
.token.bad.flash{ background:var(--bad); }

button{
  padding:10px 12px;
  border:1px solid var(--ui);
  background:#fff;
  border-radius:10px;
  cursor:pointer;
  margin-top:8px;
}

button.primary{
  background:var(--accent);
  color:#fff;
  border:none;
}

.hud{
  margin-top:12px;
  padding:12px;
  border:1px solid var(--ui);
  border-radius:10px;
  background:#fafafa;
  font-size:14px;
}

.hud .row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.panel{
  margin-top:12px;
  padding:12px;
  border:1px solid var(--ui);
  border-radius:10px;
  background:#fafafa;
  font-size:14px;
}
</style>
</head>
<body>
<div class="wrapper">

<aside class="sidebar">
<h2>ATS Optimization Simulator</h2>

<div class="hud">
<div class="row"><span>Level</span><span id="hudLevel">—</span></div>
<div class="row"><span>Time</span><span id="hudTime">—</span></div>
<div class="row"><span>Score</span><span id="hudScore">0</span></div>
<div class="row"><span>Correct</span><span id="hudCorrect">0</span></div>
<div class="row"><span>Incorrect</span><span id="hudIncorrect">0</span></div>
</div>

<button class="primary" id="btnStart">Start</button>
<button id="btnFinish" disabled>Finish</button>
<button id="btnNext" disabled>Next Level</button>
<button id="btnRestart">Restart</button>

<div class="panel" id="results" style="display:none;"></div>
</aside>

<main class="resume">
<div class="paper" id="paper">
<h1>ATS Optimization Simulator</h1>
<p>45 seconds. Click only measurable, structured, role-relevant language. Ready?</p>
</div>
</main>

</div>

<script>

/* ---------- Buzz (consistent) ---------- */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function buzz(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = 170;
  gain.gain.value = 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

/* ---------- Levels (45 seconds each) ---------- */

const LEVELS = [

{
time:45,
content:`
<h1>Avery Morgan</h1>
<h2>Summary</h2>
<p>
<span class="token good">Marketing Coordinator</span>;
<span class="token good">content calendar management</span>;
<span class="token good">email segmentation</span>;
<span class="token good">engagement rate tracking</span>;
<span class="token bad">creative powerhouse</span>;
<span class="token bad">visionary brand architect</span>;
<span class="token good">A/B subject line testing</span>;
<span class="token good">SEO copywriting</span>;
<span class="token bad">results-driven storyteller</span>.
</p>
<h2>Experience</h2>
<p>
Increased <span class="token good">newsletter open rate by 28%</span>;
Managed <span class="token good">social media analytics dashboards</span>;
Implemented <span class="token good">Google Analytics tracking</span>;
Optimized <span class="token good">landing page conversion rate</span>;
<span class="token bad">energized cross-functional vibes</span>;
<span class="token bad">elevated brand presence</span>.
</p>
<h2>Campus Leadership</h2>
<p>
<span class="token good">President, Communications Club</span>;
Oversaw <span class="token good">$12,000 event budget</span>;
Coordinated <span class="token good">interdepartmental logistics</span>;
<span class="token bad">campus inspiration</span>.
</p>
`
},

{
time:45,
content:`
<h1>Riley Chen</h1>
<h2>Summary</h2>
<p>
<span class="token good">Operations Coordinator</span>;
<span class="token good">process improvement</span>;
<span class="token good">SOP documentation</span>;
<span class="token good">vendor management</span>;
<span class="token bad">organizational ninja</span>;
<span class="token bad">culture champion</span>.
</p>
<h2>Experience</h2>
<p>
Reduced <span class="token good">processing time by 32%</span>;
Maintained <span class="token good">compliance documentation</span>;
Implemented <span class="token good">workflow automation</span>;
Tracked <span class="token good">budget variance reporting</span>;
<span class="token bad">boosted morale</span>.
</p>
<h2>Residence Life</h2>
<p>
<span class="token good">Resident Assistant</span>;
Managed <span class="token good">incident documentation</span>;
Organized <span class="token good">program logistics</span>;
<span class="token bad">hallway hero</span>.
</p>
`
},

{
time:45,
content:`
<h1>Jordan Ellis</h1>
<h2>Summary</h2>
<p>
<span class="token good">HR Generalist</span>;
<span class="token good">employee onboarding</span>;
<span class="token good">HRIS administration</span>;
<span class="token good">benefits coordination</span>;
<span class="token bad">people-first visionary</span>.
</p>
<h2>Experience</h2>
<p>
Managed <span class="token good">40+ open requisitions</span>;
Reduced <span class="token good">time-to-hire by 21%</span>;
Maintained <span class="token good">compliance tracking systems</span>;
Produced <span class="token good">weekly HR metrics reports</span>;
<span class="token bad">championed harmony</span>.
</p>
<h2>Peer Mentor</h2>
<p>
Tracked <span class="token good">mentorship attendance data</span>;
Maintained <span class="token good">progress documentation</span>;
<span class="token bad">inspirational presence</span>.
</p>
`
}

];

/* ---------- Game Logic ---------- */

let levelIndex=0;
let score=0;
let correct=0;
let incorrect=0;
let timer=null;
let timeLeft=0;

const paper=document.getElementById("paper");
const results=document.getElementById("results");

document.getElementById("btnStart").onclick=start;
document.getElementById("btnFinish").onclick=finish;
document.getElementById("btnNext").onclick=nextLevel;
document.getElementById("btnRestart").onclick=()=>location.reload();

function start(){
  const level=LEVELS[levelIndex];
  paper.innerHTML=level.content;
  score=0; correct=0; incorrect=0;
  results.style.display="none";
  document.getElementById("btnFinish").disabled=false;
  document.getElementById("btnNext").disabled=true;
  document.getElementById("hudLevel").textContent=levelIndex+1;

  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>handleClick(t);
  });

  timeLeft=level.time;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("hudTime").textContent=timeLeft+"s";
    if(timeLeft<=0){ clearInterval(timer); finish(); }
  },1000);
}

function handleClick(t){
  if(t.classList.contains("selected")) return;
  if(t.classList.contains("good")){
    score+=5; correct++;
    t.classList.add("selected");
  } else {
    score-=3; incorrect++;
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("hudScore").textContent=score;
  document.getElementById("hudCorrect").textContent=correct;
  document.getElementById("hudIncorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);
  results.style.display="block";
  results.innerHTML=`
  <strong>Time's up!</strong><br>
  Final Score: ${score}<br>
  Correct: ${correct}<br>
  Incorrect: ${incorrect}<br><br>
  ⚡ Remember: metrics beat vibes. Documentation beats charisma. Structure beats hype.
  `;
  document.getElementById("btnNext").disabled=false;
}

function nextLevel(){
  if(levelIndex<LEVELS.length-1){
    levelIndex++;
    start();
  }
}

</script>
</body>
</html>
