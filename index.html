const ctx=new (window.AudioContext||window.webkitAudioContext)();
function buzz(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="square";o.frequency.value=170;g.gain.value=.12;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.2);
}

/* GAME LOGIC */

let level=0;
let score=0,correct=0,incorrect=0;
let time=45,timer;
let wrongClicks=[];
let missed=[];

function start(){
  score=0;correct=0;incorrect=0;wrongClicks=[];missed=[];
  document.getElementById("paper").innerHTML=LEVELS[level].html;
  document.getElementById("level").textContent=level+1;
  document.getElementById("results").innerHTML="";

  document.querySelectorAll(".token").forEach(t=>{
    t.onclick=()=>clickToken(t);
  });

  time=45;
  document.getElementById("time").textContent=time+"s";
  timer=setInterval(()=>{
    time--;
    document.getElementById("time").textContent=time+"s";
    if(time<=0){clearInterval(timer);finish();}
  },1000);
}

function clickToken(t){
  if(t.classList.contains("selected"))return;

  if(t.classList.contains("good")){
    score+=5;correct++;
    t.classList.add("selected");
  }else{
    score-=3;incorrect++;
    wrongClicks.push({text:t.innerText,type:t.dataset.type});
    t.classList.add("flash");
    buzz();
    setTimeout(()=>t.classList.remove("flash"),250);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("score").textContent=score;
  document.getElementById("correct").textContent=correct;
  document.getElementById("incorrect").textContent=incorrect;
}

function finish(){
  clearInterval(timer);

  document.querySelectorAll(".token").forEach(t=>{
    if(t.classList.contains("good")){
      if(!t.classList.contains("selected")){
        missed.push(t.innerText);
        t.classList.add("missed");
      }
      t.classList.add("correct-all");
    }
  });

  let explanation="<strong>Detailed Feedback:</strong><br>";

  wrongClicks.forEach(w=>{
    explanation+="❌ <b>"+w.text+"</b> — ";
    if(w.type==="soft") explanation+="Soft skill/personality descriptor. ATS systems do not index traits.";
    else if(w.type==="prestige") explanation+="Prestige language without measurable scope.";
    else if(w.type==="vague") explanation+="Vague responsibility without defined output.";
    else if(w.type==="subtle") explanation+="Professional-sounding but lacks quantifiable result or system.";
    explanation+="<br>";
  });

  if(missed.length){
    explanation+="<br><strong>Missed High-Value Language:</strong><br>";
    missed.forEach(m=>{
      explanation+="🔵 "+m+" — Structured, measurable, tool-based, or system-driven language that ATS prioritizes.<br>";
    });
  }

  explanation+="<br><em>Green = Correct. Blue = Missed. Red = Incorrect.</em>";

  document.getElementById("results").innerHTML=
  "<strong>Time's up!</strong><br>"+
  "Score: "+score+
  "<br>Correct: "+correct+
  "<br>Incorrect: "+incorrect+
  "<br><br>"+explanation;
}

function nextLevel(){
  if(level<LEVELS.length-1){
    level++;
    start();
  }
}
