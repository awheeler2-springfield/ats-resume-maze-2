<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATS Job-Match Simulator (Non-Tech)</title>

<style>
:root{
  --bg:#f4f4f4;
  --paper:#fff;
  --ink:#111;
  --ui:#e0e0e0;
  --good:#c8f7c5;
  --bad:#ffd6d6;
  --accent:#1d3461;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Georgia, "Times New Roman", serif;
  color:var(--ink);
}

.wrapper{ display:flex; height:100vh; }

.sidebar{
  width:360px;
  background:#fff;
  border-right:1px solid var(--ui);
  padding:18px;
  overflow:auto;
  box-sizing:border-box;
}

.resume{
  flex:1;
  overflow:auto;
  padding:30px;
}

.paper{
  max-width:900px;
  margin:auto;
  background:var(--paper);
  padding:40px;
  box-shadow:0 0 12px rgba(0,0,0,.06);
}

h1{ margin:0 0 6px 0; }
h2{ margin:18px 0 6px 0; border-bottom:1px solid var(--ui); padding-bottom:4px; }

.token{
  cursor:pointer;
  padding:2px 4px;
  border-radius:4px;
}

.token.good.selected{ background:var(--good); }
.token.bad.flash{ background:var(--bad); }

.token.heat[data-heat="1"]{ background:rgba(255,200,0,.15); }
.token.heat[data-heat="2"]{ background:rgba(255,150,0,.18); }
.token.heat[data-heat="3"]{ background:rgba(255,100,0,.22); }
.token.heat[data-heat="4"]{ background:rgba(255,60,0,.25); }
.token.heat[data-heat="5"]{ background:rgba(255,0,0,.28); }

button{
  margin-top:8px;
  padding:8px 12px;
  cursor:pointer;
}

.panel{
  margin-top:12px;
  padding:10px;
  border:1px solid var(--ui);
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="sidebar">
  <h2>ATS Job Match Simulator</h2>

  <div class="panel">
    <strong>Select Job Ad</strong><br/>
    <select id="jobSelect"></select>
  </div>

  <div class="panel">
    <strong>Target Competencies</strong>
    <div id="jobKeywords"></div>
  </div>

  <div class="panel">
    <strong>HUD</strong><br/>
    Time: <span id="time">--</span><br/>
    Score: <span id="score">0</span><br/>
    Accuracy: <span id="accuracy">--</span><br/>
    Coverage: <span id="coverage">0%</span>
  </div>

  <button onclick="startGame()">Start</button>
  <button onclick="finishGame()">Finish</button>
  <button onclick="toggleHeat()">Toggle Heatmap</button>

  <div class="panel" id="results" style="display:none;"></div>
</div>

<div class="resume">
<div class="paper" id="resumeArea">
  <h1>Choose a job and click Start</h1>
</div>
</div>
</div>

<script>

/* ===============================
   JOB ADS (NON-TECH)
================================= */

const jobs = [
{
  title:"Communications Manager",
  weights:{
    "content strategy":5,
    "editorial calendar":4,
    "media relations":4,
    "brand guidelines":3,
    "newsletter analytics":4,
    "press releases":3,
    "social media reporting":3
  }
},
{
  title:"HR Generalist",
  weights:{
    "employee onboarding":5,
    "benefits administration":4,
    "compliance documentation":4,
    "performance management":3,
    "HRIS":5,
    "policy development":3,
    "recruitment coordination":4
  }
},
{
  title:"Operations Coordinator",
  weights:{
    "vendor management":4,
    "budget tracking":4,
    "process improvement":5,
    "SOP documentation":4,
    "inventory management":3,
    "stakeholder scheduling":3,
    "invoice reconciliation":4
  }
}
];

/* ===============================
   RESUMES (NON-TECH)
================================= */

const resumes = {
"Communications Manager":[
`
<h1>Alex Morgan</h1>
<h2>Summary</h2>
<p>
<span class="token good">content strategy</span>;
<span class="token good">editorial calendar</span>;
<span class="token good">newsletter analytics</span>;
<span class="token bad">creative visionary</span>;
<span class="token good">media relations</span>;
<span class="token bad">great communicator</span>.
</p>

<h2>Experience</h2>
<p>
Managed <span class="token good">press releases</span>;
Led <span class="token good">social media reporting</span>;
Developed <span class="token good">brand guidelines</span>;
Delivered <span class="token bad">impactful storytelling</span>.
</p>
`
],

"HR Generalist":[
`
<h1>Jordan Ellis</h1>
<h2>Summary</h2>
<p>
<span class="token good">employee onboarding</span>;
<span class="token good">HRIS</span>;
<span class="token good">benefits administration</span>;
<span class="token bad">people person</span>.
</p>

<h2>Experience</h2>
<p>
Oversaw <span class="token good">compliance documentation</span>;
Supported <span class="token good">recruitment coordination</span>;
Improved <span class="token good">performance management</span>;
Promoted <span class="token bad">positive culture</span>.
</p>
`
],

"Operations Coordinator":[
`
<h1>Taylor Reed</h1>
<h2>Summary</h2>
<p>
<span class="token good">process improvement</span>;
<span class="token good">SOP documentation</span>;
<span class="token good">vendor management</span>;
<span class="token bad">hard worker</span>.
</p>

<h2>Experience</h2>
<p>
Managed <span class="token good">budget tracking</span>;
Performed <span class="token good">invoice reconciliation</span>;
Coordinated <span class="token good">stakeholder scheduling</span>;
Handled <span class="token good">inventory management</span>;
Delivered <span class="token bad">excellent service</span>.
</p>
`
]
};

/* ===============================
   GAME LOGIC
================================= */

let score=0, correct=0, incorrect=0, totalGood=0;
let timeLeft=60, timer=null;
let heatOn=false;
let currentJob=null;

const jobSelect=document.getElementById("jobSelect");
jobs.forEach(j=>{
  const opt=document.createElement("option");
  opt.value=j.title;
  opt.textContent=j.title;
  jobSelect.appendChild(opt);
});

function renderJob(){
  currentJob=jobs.find(j=>j.title===jobSelect.value);
  const kwDiv=document.getElementById("jobKeywords");
  kwDiv.innerHTML="";
  Object.keys(currentJob.weights).forEach(k=>{
    kwDiv.innerHTML+=`${k} (weight ${currentJob.weights[k]})<br/>`;
  });
}

jobSelect.addEventListener("change",renderJob);
renderJob();

function startGame(){
  score=0; correct=0; incorrect=0;
  document.getElementById("results").style.display="none";

  const pool=resumes[currentJob.title];
  const resumeHTML=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById("resumeArea").innerHTML=resumeHTML;

  const tokens=document.querySelectorAll(".token");
  totalGood=[...tokens].filter(t=>t.classList.contains("good")).length;

  tokens.forEach(t=>{
    const text=t.textContent.trim();
    if(currentJob.weights[text]){
      t.dataset.heat=currentJob.weights[text];
    } else {
      t.dataset.heat=1;
    }
    t.addEventListener("click",()=>handleClick(t));
  });

  timeLeft=60;
  timer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ clearInterval(timer); finishGame(); }
    document.getElementById("time").textContent=timeLeft+"s";
  },1000);
}

function handleClick(t){
  if(t.classList.contains("selected")) return;
  if(t.classList.contains("good")){
    correct++;
    score+= currentJob.weights[t.textContent.trim()] || 1;
    t.classList.add("selected");
  } else {
    incorrect++;
    score-=2;
    t.classList.add("flash");
    setTimeout(()=>t.classList.remove("flash"),300);
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById("score").textContent=score;
  const totalClicks=correct+incorrect;
  const accuracy= totalClicks? Math.round((correct/totalClicks)*100):"--";
  const coverage= totalGood? Math.round((correct/totalGood)*100):0;
  document.getElementById("accuracy").textContent=accuracy+"%";
  document.getElementById("coverage").textContent=coverage+"%";
}

function finishGame(){
  clearInterval(timer);
  const resDiv=document.getElementById("results");
  resDiv.style.display="block";
  resDiv.innerHTML=`
  <strong>Final Score:</strong> ${score}<br/>
  <strong>Correct:</strong> ${correct}<br/>
  <strong>Incorrect:</strong> ${incorrect}<br/>
  Focus on matching resume language to weighted job competencies.
  `;
}

function toggleHeat(){
  heatOn=!heatOn;
  document.querySelectorAll(".token").forEach(t=>{
    if(heatOn) t.classList.add("heat");
    else t.classList.remove("heat");
  });
}

</script>
</body>
</html>
